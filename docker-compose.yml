version: '3.8'

services:
  alyankovid:
    image: ghcr.io/kjburnett/al-yankovid:latest
    container_name: al-yankovid
    restart: unless-stopped
    volumes:
      # Persistent Data (Signal Config, Stats, User Map)
      - ./data:/app/data
      # Library of downloaded/archived videos
      - ./archive:/app/archive
      # Logs
      - ./logs:/app/logs
    environment:
      - BOT_NUMBER=${BOT_NUMBER}
      - SIGNAL_CLI_CONFIG_DIR=/app/data
      - TZ=America/Los_Angeles  # Set your timezone
      - ROCKETCHAT_ENABLED=${ROCKETCHAT_ENABLED:-false}
      - ROCKETCHAT_URL=${ROCKETCHAT_URL:-}
      - ROCKETCHAT_USERNAME=${ROCKETCHAT_USERNAME:-}
      - ROCKETCHAT_PASSWORD=${ROCKETCHAT_PASSWORD:-}
      - ROCKETCHAT_BOT_USERNAME=${ROCKETCHAT_BOT_USERNAME:-al-yankovid}
    deploy:
      resources:
        limits:
          memory: 2G  # ffmpeg can be hungry
